<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="root"></div>
  </body>
  <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const MinutesToHours = () => {
      const [amount, setAmount] = React.useState(0);
      const [flipped, setFlipped] = React.useState(false);
      const onChange = (event) => {
        setAmount(event.target.value);
      };
      const reset = () => setAmount(0);
      const onFlip = () => {
        reset();
        setFlipped((current) => !current);
      };
      return (
        <div>
          <div>
            <h3>Minute to Hour</h3>
            <label htmlFor="minute">Minutes</label>
            <input
              value={flipped ? amount * 60 : amount}
              id="minute"
              placeholder="minutes"
              type="number"
              onChange={onChange}
              disabled={flipped}
            ></input>
          </div>
          <div>
            <label htmlFor="hour">Hours</label>
            <input
              value={flipped ? amount : Math.round(amount / 60)}
              id="hour"
              placeholder="hours"
              type="number"
              onChange={onChange}
              disabled={!flipped}
            ></input>
          </div>
          <br />

          <button onClick={reset}>Reset</button>
          <button onClick={onFlip}>Flip</button>
        </div>
      );
    };
    const KmToMiles = () => {
      const [amount, setAmount] = React.useState(0);
      const [inverse, setInverse] = React.useState(false);
      const onChange = (event) => setAmount(event.target.value);
      const reset = () => {
        setAmount(0);
      };
      const flip = () => setInverse((current) => !current);
      return (
        <div>
          <h3>Km To Miles</h3>
          <div>
            <label htmlFor="km">Km</label>
            <input
              value={inverse ? amount * 1.6 : amount}
              id="km"
              placeholder="km"
              type="number"
              onChange={onChange}
              disabled={inverse}
            ></input>
          </div>
          <div>
            <label htmlFor="mile">Mile</label>
            <input
              value={inverse ? amount : amount * 0.62}
              id="mile"
              placeholder="mile"
              type="number"
              onChange={onChange}
              disabled={!inverse}
            ></input>
          </div>
          <br />
          <button onClick={reset}>Reset</button>
          <button onClick={flip}>Flip</button>
        </div>
      );
    };
    const App = () => {
      const [index, setIndex] = React.useState("xx");
      const onSelect = (event) => {
        setIndex(event.target.value);
      };

      return (
        <div>
          <h1>Super Converter</h1>
          <select value={index} onChange={onSelect}>
            <option value="xx">Select your units</option>
            <option value="0">Minutes & Hours</option>
            <option value="1">Km & Miles</option>
          </select>
          <hr />
          {index === "xx" ? "Please select your unit" : null}
          {index === "0" ? <MinutesToHours /> : null}
          {index === "1" ? <KmToMiles /> : null}
        </div>
      );
    };
    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</html>
